<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaraBase</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f1a12;
color:white;
display:flex;
}

.sidebar{
width:230px;
background:#13251a;
height:100vh;
padding-top:20px;
position:fixed;
}

.sidebar h2{
text-align:center;
color:#7CFF9B;
}

.sidebar a{
display:block;
color:white;
padding:15px;
text-decoration:none;
}

.sidebar a:hover{
background:#1e3a28;
}

.content{
margin-left:230px;
width:100%;
}

.banner{
width:100%;
height:320px;
overflow:hidden;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
}

header{
text-align:center;
padding:20px;
background:#1e3a28;
}

.subtitle{
color:#7CFF9B;
font-style:italic;
}

.section{
padding:40px;
}

.gallery{
display:flex;
flex-wrap:wrap;
gap:20px;
}

.gallery img{
width:260px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

#imageViewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

#imageViewer img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

.chatbox{
background:#1e3a28;
padding:20px;
border-radius:10px;
max-width:600px;
}

textarea{
width:100%;
padding:10px;
border-radius:8px;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
background:#7CFF9B;
border-radius:8px;
cursor:pointer;
}

iframe{
width:100%;
height:400px;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>MaraBase</h2>
<a href="#photos">Photos</a>
<a href="#address">Address</a>
<a href="#chat">Discussion</a>
</div>

<div class="content">

<div class="banner">
<img src="banner_marabase.png" alt="MaraBase banner">
</div>

<header>
<h1>MaraBase</h1>
<p class="subtitle">A website designed by a Marabro for Marabros</p>
</header>

<section class="section" id="photos">
<h2>Photos</h2>
<h3>1 years old 👶</h3>

<div class="gallery">
<img src="banner_marabase.png" onclick="openImage(this)">
</div>
</section>

<section class="section" id="address">
<h2>Address 📍</h2>

<p>
Populierstraat 109<br>
2565 MK The Hague<br>
Netherlands
</p>

<iframe src="https://www.google.com/maps?q=Populierstraat%20109%202565%20MK%20The%20Hague%20Netherlands&output=embed"></iframe>

</section>

<section class="section" id="chat">
<h2>Discussion anonyme 💬</h2>

<div class="chatbox">

<form id="chatForm">
<textarea id="message" placeholder="Écris ton message..."></textarea>
<br>
<button type="submit">Envoyer</button>
</form>

<ul id="messagesList"></ul>

</div>

</section>

</div>

<div id="imageViewer" onclick="closeImage()">
<img id="viewerImg">
</div>

<script>

function openImage(img){
document.getElementById("imageViewer").style.display="flex";
document.getElementById("viewerImg").src=img.src;
}

function closeImage(){
document.getElementById("imageViewer").style.display="none";
}

const form=document.getElementById("chatForm");

form.addEventListener("submit",function(e){

e.preventDefault();

const msg=document.getElementById("message").value.trim();

if(msg){

const li=document.createElement("li");
li.textContent="Anonyme : "+msg;

document.getElementById("messagesList").appendChild(li);

document.getElementById("message").value="";

}

});

</script>

</body>
</html>
